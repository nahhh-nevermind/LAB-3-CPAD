<!DOCTYPE html>
<html>

<head>
	<title>☀️WeatherNow</title>
	<link rel="stylesheet" href="style.css">
	<script src="app.js" defer></script>
</head>

<body>
	<header>
		<h1>WeatherNow — Real-Time Data Dashboard with Fetch API & jQuery</h1>
	</header>
	<section id="searchbar">
		<label for="searchinput">🔎</label>
		<input type="text" id="searchinput" name="searchinput">

		<button type="button">Search</button>
	</section>

	<section id="currentweather">
		<div id="city" class="skeleton"></div>
		<div id="temp" class="skeleton"></div>
		<div id="weather" class="skeleton"></div>
		<div id="humidity" class="skeleton"></div>
		<div id="wind" class="skeleton"></div>
		<div id="time" class="skeleton"></div>
		<div id="retry">Retry</div>
	</section>

	<section id="forecast">
		<div id="mon" class="skeleton">
			<h2>Monday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
		<div id="tues" class="skeleton">
			<h2>Tuesday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
		<div id="wednes" class="skeleton">
			<h2>Wednesday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
		<div id="thurs" class="skeleton">
			<h2>Thursday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
		<div id="fri" class="skeleton">
			<h2>Friday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
		<div id="satur" class="skeleton">
			<h2>Saturday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
		<div id="sun" class="skeleton">
			<h2>Sunday</h2>
			<p class="weathericon"></p>
			<p class="hightemp"></p>
			<p class="lowtemp"></p>
		</div>
	</section>
</body>

</html>
